services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-project3}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-project3}
      POSTGRES_DB: ${POSTGRES_DB:-project3}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project3 -d project3"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build: ./apps/api
    env_file: .env
    ports: ["4000:4000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}/api/v1
    ports: ["3000:3000"]
    depends_on: [api]
volumes: {postgres_data: {}}
